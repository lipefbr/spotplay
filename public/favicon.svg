<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Music note -->
  <g transform="translate(256,256) scale(1.1)" fill="url(#note)">
    <!-- Note stem -->
    <rect x="38" y="-140" width="24" height="240" rx="12"/>
    <!-- Note head (left) -->
    <ellipse cx="0" cy="100" rx="58" ry="42" transform="rotate(-15,0,100)"/>
    <!-- Note head (right) -->
    <ellipse cx="100" cy="60" rx="58" ry="42" transform="rotate(-15,100,60)"/>
    <!-- Beam connecting stems -->
    <rect x="38" y="-140" width="86" height="28" rx="14"/>
  </g>
</svg>
